name: Python Release Build

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "python/**"
  push:
    tags: ["*-rc*"]

jobs:
  test-release:
    name: Test Python Release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 #2.9.1

      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "27.4"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Build Python package
        run: |
          cd python
          uv sync --dev --no-install-package ballista
          uv run pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      # Use the --no-install-package to only install the dependencies
      # but do not yet build the rust library
      - name: Install dependencies
        run: |
          cd python
          uv sync --dev --no-install-package ballista

      # Update output format to enable automatic inline annotations.
      - name: Run Ruff
        run: |
          cd python
          uv run --no-project ruff check --output-format=github .
          uv run --no-project ruff format --check .

  generate-license:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Generate license file
        run: uv run --no-project python ./dev/create_license.py
      - uses: actions/upload-artifact@v7
        with:
          name: python-wheel-license
          path: LICENSE.txt

  build-python-mac-win:
    if: github.event_name != 'pull_request'
    needs: [generate-license, build, test-release]
    name: Mac/Win
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]
        os: [macos-latest, windows-2022]
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 #2.9.1
        with:
          # FIXME: temporary workaround, see: https://github.com/Swatinem/rust-cache/issues/341
          cache-bin: ${{ matrix.os != 'macos-latest' }}
          workspaces: |
            python -> target

      - run: rm LICENSE.txt
      - name: Download LICENSE.txt
        uses: actions/download-artifact@v8
        with:
          name: python-wheel-license
          path: .

      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "27.4"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Build Python package
        run: |
          cd python
          uv sync --dev --no-install-package ballista
          uv run --no-project maturin build --release --strip

      - name: List Windows wheels
        if: matrix.os == 'windows-2022'
        run: dir python\target\wheels\
        # since the runner is dynamic shellcheck (from actionlint) can't infer this is powershell
        # so we specify it explicitly
        shell: powershell

      - name: List Mac wheels
        if: matrix.os != 'windows-2022'
        run: find python/target/wheels/

      - name: Archive wheels
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os  }}
          path: python/target/wheels/*

  build-manylinux-x86_64:
    if: github.event_name != 'pull_request'
    needs: [generate-license, build, test-release]
    name: Manylinux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 #2.9.1

      - run: rm LICENSE.txt
      - name: Download LICENSE.txt
        uses: actions/download-artifact@v8
        with:
          name: python-wheel-license
          path: .

      - run: cat LICENSE.txt

      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "27.4"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Build Python package
        run: |
          cd python
          uv sync --dev --no-install-package ballista
          uv run --no-project maturin build --release --strip

      - name: Archive wheels
        uses: actions/upload-artifact@v7
        with:
          name: dist-manylinux-x86_64
          path: python/target/wheels/*

  build-manylinux-aarch64:
    if: github.event_name != 'pull_request'
    needs: [generate-license, build, test-release]
    name: Manylinux arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 #2.9.1

      - run: rm LICENSE.txt
      - name: Download LICENSE.txt
        uses: actions/download-artifact@v8
        with:
          name: python-wheel-license
          path: .

      - run: cat LICENSE.txt

      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "27.4"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Build Python package
        run: |
          cd python
          uv sync --dev --no-install-package ballista
          uv run --no-project maturin build --release --strip

      - name: Archive wheels
        uses: actions/upload-artifact@v7
        with:
          name: dist-manylinux-aarch64
          path: python/target/wheels/*

  build-sdist:
    if: github.event_name != 'pull_request'
    needs: [generate-license, build, test-release]
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 #2.9.1

      - run: rm LICENSE.txt
      - name: Download LICENSE.txt
        uses: actions/download-artifact@v8
        with:
          name: python-wheel-license
          path: .

      - run: cat LICENSE.txt

      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "27.4"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Build Python package
        run: |
          cd python
          uv sync --dev --no-install-package ballista
          uv run --no-project maturin sdist --out dist

      - name: Assert sdist build does not generate wheels
        run: |
          cd python
          # `--out dist` causes maturin to place artifacts under python/dist/.
          # Older maturin versions also wrote to the default python/target/wheels/,
          # so check both locations.
          found=$(find dist target/wheels -name '*.whl' 2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "Error: Sdist build generated wheels:"
            echo "$found"
            exit 1
          fi
          echo "No wheels generated (expected)."
        shell: bash

      - name: Archive sdist
        uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: python/dist/*.tar.gz

  merge-build-artifacts:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - build-python-mac-win
      - build-manylinux-x86_64
      - build-manylinux-aarch64
      - build-sdist
    steps:
      - name: Merge Build Artifacts
        uses: actions/upload-artifact/merge@v7
        with:
          name: dist
          pattern: dist-*

  # NOTE: PyPI publish needs to be done manually for now after release passed the vote
